<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
th:replace="~{normal/base::layout(~{::section})}">
<head>

	<title> private page</title>
</head>

	</div></div>
	</div>

	<script >
	$(document).ready(()=>{
		$(".item").removeClass('active');

	</section>
