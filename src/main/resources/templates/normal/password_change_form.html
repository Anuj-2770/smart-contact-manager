<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title>This is the password change form page</title>
</head>
<body>

<section class="vh-100 d-flex align-items-center"
         style="background: linear-gradient(135deg, #8E2DE2, #4A00E0);">
  <div class="container py-5">
    <div class="row d-flex justify-content-center align-items-center">
      <div class="col col-xl-10">
        <div class="card shadow-lg border-0 overflow-hidden" style="border-radius: 1.5rem;">
          <div class="row g-0">

            <!-- Left Image Section -->
            <div class="col-md-6 col-lg-5 d-none d-md-block">
              <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/img1.webp"
                   alt="change password form"
                   class="img-fluid w-100 h-100"
                   style="object-fit: cover; border-radius: 1.5rem 0 0 1.5rem; min-height: 100%;" />
            </div>

            <!-- Right Form Section -->
            <div class="col-md-6 col-lg-7 d-flex align-items-center" style="background-color: #fff;">
              <div class="card-body p-4 p-lg-5 text-black w-100">

                <div class="text-center mb-4">
                  <h2 class="fw-bold" style="color: #4A00E0;">Change Password</h2>
                  <p class="text-muted mb-0">Enter your new password below</p>
                </div>

                <!-- Message Block -->
                <div th:if="${message}" class="container mb-3">
                  <div class="alert alert-info text-center" role="alert">
                    <span th:text="${message}"></span>
                  </div>
                </div>

                <form th:action="@{/change-password}" method="post" class="w-100">

                  <div class="form-group mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password"
                           class="form-control form-control-lg"
                           placeholder="Enter new password"
                           name="newPassword"
                           required
                           style="border-radius: 0.8rem;" />
                  </div>

                  <div class="form-group mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password"
                           class="form-control form-control-lg"
                           placeholder="Confirm new password"
                           name="confirmPassword"
                           required
                           style="border-radius: 0.8rem;" />
                  </div>

                  <div class="d-grid">
                    <button type="submit"
                            class="btn btn-lg text-white fw-semibold"
                            style="background: linear-gradient(90deg, #ff9800, #ff5722); border: none; border-radius: 0.8rem;">
                      Change Password
                    </button>
                  </div>
                </form>

                <div class="text-center mt-4">
                  <small class="text-muted">Make sure your password is strong and secure</small>
                </div>

              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
