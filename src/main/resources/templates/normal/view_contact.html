<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
th:replace="~{normal/base::layout(~{::section})}">
<head>
	<meta charset="UTF-8" />
	<title> private page</title>
</head>
<body>
	<section>
	<div class="card">
	<div class="card-body ">
	<h1 class = "text-center"> Your Contacts</h1>
	<!-- Search -->
	<div class="search-container my-3">
	<input onKeyup="search()" id="search-input" type="text" class="form-control" placeholder="searh your contacts">
	<div class="search-result">
	
	<!-- result goes here -->
	
	
	</div>
	</div>
	
	<!--  contact tables -->
<div class="table-esponsive">
<table class="table">
  <thead class="thead-light">
    <tr>
      <th scope="col">#ID</th>
      <th scope="col">Name</th>
      <th scope="col">Phone</th>
      <th scope="col">Email</th>
       <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="c: ${contacts}">
      <th scope="row" th:text="${'SCMUSER' +c.cId}">1</th>
      
      <td>
      <img  class="my_profile_picture" alt="/user_profile_image" src="" th:src="@{'/image/' + ${c.image}}">
      <span th:text="${c.name}"></span></td>
      
      <td th:text="${c.phone}">Otto</td>
      
      <td>
      <a href="#" th:href="@{'/user/' +${c.cId} +'/contact'}">
      <span th:text="${c.email}"></span>
      </a>
      </td>
      
      <td>
      <a href="#" th:onclick="|deleteContact(${c.cId})|" class="btn btn-danger btn-sm">Delete</a>
       <form  method ="post"  th:action="@{'/user/update-contact/'+${c.cId}}" class="mt-2">
       
       <button type = "submit" class="btn btn-primary btn-sm">Update</button>
       
       </form>
      </td>
    </tr>
  </tbody>
</table>
</div>
<!-- pagination  -->
 <nav aria-label="Page navigation example">
  <ul class="pagination">
    <li th:if="${currentPage != 0}" class="page-item"><a  th:href="@{'/user/view_contact/'+ ${currentPage-1}}" 
    class="page-link" href="#">Previous</a></li>
    
    <li th:classappend="${currentPage ==i-1 ? 'active' : ' '}" th:each=" i : ${#numbers.sequence(1,totalPages)}"
    class="page-item"><a class="page-link"
    th:href="@{'/user/view_contact/'+ ${i-1}}" ><span th:text="${i}"></span></a></li>
  
    <li th:if="${currentPage+1 != totalPages}" class="page-item"><a 
    th:href="@{'/user/view_contact/'+ ${currentPage+1}}"
    class="page-link" href="#">Next</a></li>
  </ul>
</nav>
	</div>
	
	<script >
	$(document).ready(()=>{
		$(".item").removeClass('active');
		$("#view-link").addClass('active');
	})
	</script>
	
	</section>
</body>
</html>
